# Environment variables are loaded from .env file
# Copy .env.example to .env and configure your settings

services:
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: agent_builder
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
      POSTGRES_DB: agent_builder
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/00-init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agent_builder && psql -U agent_builder -d agent_builder -c 'SELECT 1 FROM agents LIMIT 1' > /dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: ..
      dockerfile: signalwire-agents-ui/docker/Dockerfile
    restart: unless-stopped
    ports:
      - "8430:8430"
      - "8429:8429"
    environment:
      DATABASE_URL: postgresql://agent_builder:${DB_PASSWORD:-changeme}@db:5432/agent_builder
      DB_PASSWORD: ${DB_PASSWORD:-changeme}
      JWT_SECRET: ${JWT_SECRET:-change-this-secret-key}
      HOSTNAME: ${HOSTNAME:-localhost}
      PORT: ${PORT:-8430}
      API_PORT: ${API_PORT:-8000}
      RATE_LIMIT_API: ${RATE_LIMIT_API:-100}
      RATE_LIMIT_SWML: ${RATE_LIMIT_SWML:-1000}
      SIGNALWIRE_JWT_SECRET: ${SIGNALWIRE_JWT_SECRET:-change-this-for-production}
      BUILD_VERSION: ${BUILD_VERSION:-dev}
    volumes:
      - app_logs:/app/logs
      - kb_storage:/app/data/knowledge_base
      - media_storage:/app/data/media
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
  app_logs:
  kb_storage:
  media_storage: